<style>
*{margin:0;padding:0;box-sizing:border-box}

<script>

// ===== DATA =====
const SK='promptbox_data';
const FCOLORS=['#007AFF','#34C759','#AF52DE','#FF9500','#FF3B30','#5AC8FA','#FF2D55','#30D158'];
const TCOLORS=[{n:'蓝',c:'#007AFF'},{n:'绿',c:'#34C759'},{n:'紫',c:'#AF52DE'},{n:'橙',c:'#FF9500'},{n:'粉',c:'#FF2D55'},{n:'青',c:'#5AC8FA'},{n:'红',c:'#FF3B30'},{n:'金',c:'#BF5700'}];
const CCOLORS=['#007AFF','#34C759','#FF9500','#FF3B30','#AF52DE','#5AC8FA'];
const TPLS=[
  {id:'tpl_w',name:'写作专家',icon:'\u270D\uFE0F',content:'你是一位专业的写作专家。请帮我写一篇关于{{主题}}的文章。\n\n要求：\n- 风格：{{风格}}\n- 字数：{{字数}}\n- 目标读者：{{读者群体}}\n\n请确保内容结构清晰，语言流畅，有吸引力的开头和有力的结尾。',tags:['写作','AI']},
  {id:'tpl_v',name:'AI视频脚本',icon:'\uD83C\uDFAC',content:'请为我生成一个{{时长}}的AI视频脚本。\n\n**视频主题：** {{主题}}\n**目标平台：** {{平台}}\n**风格基调：** {{风格}}\n\n请按以下格式输出：\n\n## 画面描述\n（每一段的视觉元素、镜头运动）\n\n## 旁白文案\n（对应的解说词）\n\n## 背景音乐建议\n（情绪和节奏提示）',tags:['视频','AI']},
  {id:'tpl_i',name:'AI生图提示词',icon:'\uD83C\uDFA8',content:'{{主体描述}}, {{场景}}, {{光线}}, {{风格}}, {{画质}}\n\n**Negative prompt:** {{负面提示词}}\n**Steps:** {{步数}}, **CFG:** {{CFG值}}, **Sampler:** {{采样器}}, **Size:** {{尺寸}}',tags:['生图','AI']},
  {id:'tpl_c',name:'代码审查',icon:'\uD83D\uDCBB',content:'请帮我审查以下代码，关注：\n\n1. **代码质量** - 可读性、命名规范\n2. **性能** - 潜在的性能问题\n3. **安全** - 安全漏洞\n4. **最佳实践** - 是否遵循{{语言}}的最佳实践\n\n```{{语言}}\n{{代码}}\n```\n\n请给出具体的改进建议和修改后的代码。',tags:['代码','审查']},
  {id:'tpl_t',name:'翻译专家',icon:'\uD83C\uDF10',content:'请将以下{{源语言}}文本翻译成{{目标语言}}。\n\n**翻译要求：**\n- 保持原文的语气和风格\n- 专业术语准确\n- 表达自然流畅\n\n**原文：**\n{{原文内容}}',tags:['翻译']},
  {id:'tpl_d',name:'数据分析',icon:'\uD83D\uDCCA',content:'请帮我分析以下数据：\n\n{{数据}}\n\n**分析维度：**\n1. 数据概览和关键指标\n2. 趋势分析\n3. 异常值检测\n4. 可行的改进建议\n\n**输出格式：** {{格式要求}}',tags:['数据','分析']}
];
let D=loadD(),curF=null,editId=null,editTags=[],pendingFiles=[],pendingKeep=[],selectedIds=new Set(),batchMode=false;

let activeTagFilters=[],mdMode='edit',dragSrcId=null;
// Utility functions (must be defined before any usage)
function gid(){return 'p'+Math.random().toString(36).slice(2,10)+Date.now().toString(36)}
function gfid(){return 'f'+Math.random().toString(36).slice(2,10)}
function fdate(ts){if(!ts)return'';const d=new Date(ts);const now=new Date();const pad=n=>String(n).padStart(2,'0');const time=pad(d.getHours())+':'+pad(d.getMinutes());if(d.toDateString()===now.toDateString())return'今天 '+time;const y=new Date(now-86400000);if(d.toDateString()===y.toDateString())return'昨天 '+time;return d.getMonth()+1+'/'+d.getDate()+' '+time}
function toast(msg){const t=document.getElementById('_toast');if(!t){const el=document.createElement('div');el.id='_toast';el.className='toast';document.body.appendChild(el);el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2000);return}t.textContent=msg;t.classList.add('show');clearTimeout(t._timer);t._timer=setTimeout(()=>t.classList.remove('show'),2000)}
function defD(){return{prompts:[],folders:[],templates:[],copyHistory:[],settings:{darkMode:false,grid:1,themeColor:'#007AFF'},nid:1}}
function loadD(){try{const r=localStorage.getItem(SK);if(r){const d=JSON.parse(r);if(!d.templates||!Array.isArray(d.templates))d.templates=[];if(!d.copyHistory||!Array.isArray(d.copyHistory))d.copyHistory=[];if(!d.settings||typeof d.settings!=='object')d.settings={darkMode:false,grid:1,themeColor:'#007AFF'};if(!d.settings.themeColor)d.settings.themeColor='#007AFF';if(!Array.isArray(d.prompts))d.prompts=[];if(!Array.isArray(d.folders))d.folders=[];return d}}catch(e){console.error('loadD error:',e)}return defD()}
let saveTimer;
function saveD(){clearTimeout(saveTimer);saveTimer=setTimeout(()=>saveDNow(),300)}
function saveDNow(){
  try{localStorage.setItem(SK,JSON.stringify(D))}
  catch(e){
    if(e.name==='QuotaExceededError'){
      // Move large attachments to IndexedDB
      extractBigData(()=>{try{localStorage.setItem(SK,JSON.stringify(D))}catch(e2){toast('存储空间不足，请删除一些提示词')}});
    }else{toast('保存失败：'+e.message)}
  }
}
// IndexedDB for large attachment data
// Markdown render
function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function mdRender(s){
  if(!s)return'';s=esc(s);
  s=s.replace(/```(\w*)\n([\s\S]*?)```/g,(m,l,c)=>'<pre><code>'+c.trim()+'</code></pre>');
  s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
  s=s.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  s=s.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  s=s.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/\*(.+?)\*/g,'<em>$1</em>');
  s=s.replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>');
  s=s.replace(/^\- (.+)$/gm,'<li>$1</li>');
  s=s.replace(/(<li>.*<\/li>\n?)+/g,(m)=>'<ul>'+m+'</ul>');
  s=s.replace(/\n/g,'<br>');
  return s
}

// Clipboard copy with robust fallback for Android WebView
function clipCopy(text){
  // Try execCommand first (most reliable on Android WebView, needs user gesture)
  return new Promise((resolve,reject)=>{
    try{
      const ta=document.createElement('textarea');
      ta.value=text;ta.readOnly=true;
      ta.style.cssText='position:fixed;left:-9999px;top:-9999px;opacity:0';
      document.body.appendChild(ta);
      ta.select();ta.setSelectionRange(0,ta.value.length);
      const ok=document.execCommand('copy');
      document.body.removeChild(ta);
      if(ok){resolve();return}
    }catch(e){}
    // Fallback: clipboard API (works on HTTPS)
    if(navigator.clipboard&&navigator.clipboard.writeText){
      try{
        navigator.clipboard.writeText(text).then(resolve).catch(reject);
        return;
      }catch(e){}
    }
    reject(new Error('copy failed'));
  });
}

// IndexedDB for attachments
const IDB_NAME='PromptBoxDB',IDB_STORE='attachments';
function openIDB(){return new Promise((res,rej)=>{const r=indexedDB.open(IDB_NAME,1);r.onupgradeneeded=e=>{e.target.result.createObjectStore(IDB_STORE)};r.onsuccess=e=>res(e.target.result);r.onerror=e=>rej(e.target.error)})}
async function dbSet(key,val){const db=await openIDB();return new Promise((res,rej)=>{const tx=db.transaction(IDB_STORE,'readwrite');tx.objectStore(IDB_STORE).put(val,key);tx.oncomplete=()=>res();tx.onerror=e=>rej(e.target.error)})}
async function dbGet(key){const db=await openIDB();return new Promise((res,rej)=>{const tx=db.transaction(IDB_STORE,'readonly');const r=tx.objectStore(IDB_STORE).get(key);r.onsuccess=()=>res(r.result);r.onerror=e=>rej(e.target.error)})}
async function dbDel(key){const db=await openIDB();return new Promise((res,rej)=>{const tx=db.transaction(IDB_STORE,'readwrite');tx.objectStore(IDB_STORE).delete(key);tx.oncomplete=()=>res();tx.onerror=e=>rej(e.target.error)})}
async function loadAttachmentURL(att){
  if(att.url)return att.url;
  if(att.id){try{const d=await dbGet(att.id);if(d)return URL.createObjectURL(d)}catch(e){}}
  return null;
}

// Save with version
function saveWithVersion(p){
  if(!p.versions)p.versions=[];
  p.versions.unshift({content:p.content,title:p.title,savedAt:Date.now()});
  if(p.versions.length>5)p.versions.length=5;
}

// ===== RENDER =====
function render(){
  try{
  let list=[...D.prompts];
  // Trash filter
  if(curF==='__trash__'){
    list=list.filter(p=>p.deleted);
  }else{
    list=list.filter(p=>!p.deleted);
    if(curF&&curF!=='__star__'&&curF!=='__pin__')list=list.filter(p=>p.folder===curF);
    if(curF==='__star__')list=list.filter(p=>p.starred);
    if(curF==='__pin__')list=list.filter(p=>p.isPinned);
  }
  // Search
  const q=document.getElementById('searchIn').value.trim().toLowerCase();
  if(q)list=list.filter(p=>p.title.toLowerCase().includes(q)||p.content.toLowerCase().includes(q)||(p.tags||[]).some(t=>t.toLowerCase().includes(q)));
  // Tag filter
  if(activeTagFilters.length>0){
    list=list.filter(p=>activeTagFilters.every(ft=>(p.tags||[]).includes(ft)));
  }
  // Sort: pinned first, then by sort
  const sort=D.settings.sort||'time_desc';
  list.sort((a,b)=>{
    if(a.isPinned&&!b.isPinned)return-1;if(!a.isPinned&&b.isPinned)return 1;
    switch(sort){
      case'time_desc':return(b.updatedAt||b.createdAt||0)-(a.updatedAt||a.createdAt||0);
      case'time_asc':return(a.updatedAt||a.createdAt||0)-(b.updatedAt||b.createdAt||0);
      case'name_asc':return(a.title||'').localeCompare(b.title||'');
      case'name_desc':return(b.title||'').localeCompare(a.title||'');
      case'use_desc':return(b.copyCount||0)-(a.copyCount||0);
      default:return(b.updatedAt||b.createdAt||0)-(a.updatedAt||a.createdAt||0);
    }
  });
  // Drag sort
  if(sort==='custom')list.sort((a,b)=>(a.sortOrder||0)-(b.sortOrder||0));
  const box=document.getElementById('cardsBox');
  box.className='cards g'+(D.settings.grid||1);
  if(!list.length&&!q&&!activeTagFilters.length&&curF!=='__trash__'){
    box.innerHTML='';
    document.getElementById('empty').style.display='none';
    renderOnboard(true);return;
  }
  document.getElementById('onboardArea').innerHTML='';
  document.getElementById('empty').style.display=list.length?'none':'block';
  box.innerHTML=list.map((p,i)=>{
    const fc=p.colorMark||'';const fid=p.folder;
    const f=fid?D.folders.find(f2=>f2.id===fid):null;
    const fc2=fc||(f?f.color:'')||'';
    const cc='';
    
    const faved=p.starred?'on':'';const pinned=p.isPinned?'on':'';
    const sel=selectedIds.has(p.id)?'selected':'';
    const tags=(p.tags||[]).map(t=>`<span class="card-tag" onclick="event.stopPropagation();filterByTag('${esc(t)}')">${esc(t)}</span>`).join('');
    const cHtml=p.content?`<div class="card-md">${mdRender(p.content.slice(0,300))}</div>`:'';
    const exHtml=p.example?`<div class="card-ex">例: ${esc(p.example.slice(0,80))}</div>`:'';
    const imgs=(p.attachments||[]).filter(a=>a.type==='image').slice(0,8);
    const hasImg=imgs.length>0;
    let atG='';
    if(hasImg){
      const items=imgs.map((a,idx)=>`<div class="stack-item"><img src="${a.thumb||a.url||''}" alt=""></div>`).join('');
      const cnt=imgs.length>1?`<div class="stack-count">${imgs.length} 张</div>`:'';
      atG=`<div class="card-gal" data-prompt-id="${p.id}"><div class="stack-wrap">${items}${cnt}</div></div>`;
      // Lazy load images without url from IDB
      setTimeout(()=>{
        const gal=document.querySelector(`.card-gal[data-prompt-id="${p.id}"]`);
        if(!gal)return;
        gal.querySelectorAll('.stack-item[data-att-id]').forEach(async el=>{
          const attId=el.dataset.attId;
          if(!attId)return;
          try{
            const src=await loadAttachmentURL({id:attId});
            if(src)el.innerHTML=`<img src="${src}" alt="">`;
            else el.innerHTML=`<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:13px;opacity:.5">\u65E0\u6CD5\u52A0\u8F7D</div>`;
          }catch(e){el.innerHTML=''}
        });
        const wrap=gal.querySelector('.stack-wrap');
        if(wrap&&!wrap._inited){wrap._inited=1;initStack(wrap)}
      },50);
    }
    const isMobile='ontouchstart'in window;
    const dragAttr=isMobile?'':`draggable="true" ondragstart="onDragStart(event,'${p.id}')" ondragover="onDragOver(event)" ondragenter="onDragEnter(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'${p.id}')`;
    return`<div class="card ${sel}${hasImg?' has-img':''}" style="animation-delay:${i*30}ms;${cc}" data-id="${p.id}" ${dragAttr} onclick="cardTap('${p.id}')">${atG}<div class="card-body"><div class="card-top"><div class="card-title">${esc(p.title)}</div><div class="card-pin ${pinned}" onclick="event.stopPropagation();togglePin('${p.id}')">\uD83D\uDCCC</div><div class="card-fav ${faved}" onclick="event.stopPropagation();toggleStar('${p.id}')">\u2B50</div></div>${cHtml}${exHtml}</div>${tags?`<div class="card-tags">${tags}</div>`:''}<div class="card-ft"><button class="cp" onclick="event.stopPropagation();copyP('${p.id}')">\u2398</button><button onclick="event.stopPropagation();editP('${p.id}')">\u270F\uFE0F</button><button onclick="event.stopPropagation();shareP('${p.id}')">\uD83D\uDCE4</button><button onclick="event.stopPropagation();restoreP('${p.id}')" style="${curF==='__trash__'?'':'display:none'}">\uD83D\uDD04</button><span class="info">${fdate(p.updatedAt||p.createdAt)} \u00B7 ${p.copyCount||0}\u6B21</span></div></div>`;
  }).join('');
  renderSB();renderTagFilter();
  }catch(e){console.error('render error:',e)}
}

// ===== IMAGE STACK SWIPE (circular) =====
function initStack(wrap){
  if(!wrap._cur&&wrap._cur!==0)wrap._cur=0;

  function layout(){
    const items=[...wrap.querySelectorAll('.stack-item')];
    const count=items.length;if(!count)return;
    const cur=wrap._cur%count;

    // Update dots
    let dots=wrap.parentElement.querySelector('.stack-dots');
    if(!dots&&count>1){
      dots=document.createElement('div');dots.className='stack-dots';
      wrap.parentElement.appendChild(dots);
    }
    if(dots){
      dots.innerHTML=count>1?items.map((_,i)=>`<span class="dot${i===cur?' active':''}"></span>`).join(''):'';
    }

    // Position items - straight, no rotation
    items.forEach((el,i)=>{
      const diff=(i-cur+count)%count;
      if(diff===0){
        el.style.opacity='1';el.style.pointerEvents='auto';el.style.zIndex=3;
        el.style.transform='';el.style.clipPath='';
      }else if(diff<3){
        el.style.opacity='1';el.style.pointerEvents='none';el.style.zIndex=3-diff;
        el.style.transform=`translateY(${diff*5}px) scale(${1-diff*0.03})`;
        el.style.clipPath=`inset(0 0 0 ${diff*10}px)`;
      }else{
        el.style.opacity='0';el.style.pointerEvents='none';el.style.zIndex=0;
      }
    });
    return items;
  }

  layout();

  // Touch handlers - bind once
  if(wrap._bound)return;
  wrap._bound=1;
  let sx=0,dx=0,moving=false,animating=false,startIdx=-1;

  wrap.addEventListener('touchstart',function(e){
    if(animating)return;
    const t=e.touches[0];
    sx=t.clientX;dx=0;moving=false;
    startIdx=wrap._cur;
  },{passive:true});

  wrap.addEventListener('touchmove',function(e){
    if(animating||startIdx<0)return;
    dx=e.touches[0].clientX-sx;
    if(Math.abs(dx)>8&&!moving){
      moving=true;
      const items=[...wrap.querySelectorAll('.stack-item')];
      const topEl=items[startIdx%items.length];
      if(topEl)topEl.style.transition='none';
    }
    if(!moving)return;
    e.preventDefault();
    const items=[...wrap.querySelectorAll('.stack-item')];
    const topEl=items[startIdx%items.length];
    if(topEl){
      topEl.style.transform=`translateX(${dx}px) scale(1.02)`;
      topEl.style.opacity=Math.max(0.5,1-Math.abs(dx)/300);
    }
  },{passive:false});

  wrap.addEventListener('touchend',function(e){
    if(startIdx<0)return;
    const items=[...wrap.querySelectorAll('.stack-item')];
    const count=items.length;if(!count){startIdx=-1;return}
    const topEl=items[startIdx%count];
    if(moving&&Math.abs(dx)>50&&topEl){
      animating=true;
      const dir=dx>0?1:-1;
      topEl.style.transition='transform .22s ease-out,opacity .18s';
      topEl.style.transform=`translateX(${dir*350}px)`;
      topEl.style.opacity='0';
      wrap._cur=(wrap._cur+dir+count)%count;
      setTimeout(()=>{
        if(topEl){topEl.style.transition='';topEl.style.transform='';topEl.style.opacity=''}
        layout();animating=false;
      },220);
    }else if(topEl){
      topEl.style.transition='transform .15s ease-out,opacity .1s';
      topEl.style.transform='';topEl.style.opacity='';
      setTimeout(()=>{if(topEl)topEl.style.transition=''},150);
    }
    moving=false;startIdx=-1;dx=0;
  },{passive:true});

  // Mouse support for desktop
  let mouseDown=false;
  wrap.addEventListener('mousedown',function(e){
    if(animating)return;
    mouseDown=true;
    sx=e.clientX;dx=0;moving=false;
    startIdx=wrap._cur;
    e.preventDefault();
  });
  wrap.addEventListener('mousemove',function(e){
    if(!mouseDown||animating||startIdx<0)return;
    dx=e.clientX-sx;
    if(Math.abs(dx)>8&&!moving){
      moving=true;
      const items=[...wrap.querySelectorAll('.stack-item')];
      const topEl=items[startIdx%items.length];
      if(topEl)topEl.style.transition='none';
    }
    if(!moving)return;
    const items=[...wrap.querySelectorAll('.stack-item')];
    const topEl=items[startIdx%items.length];
    if(topEl){
      topEl.style.transform=`translateX(${dx}px) scale(1.02)`;
      topEl.style.opacity=Math.max(0.5,1-Math.abs(dx)/300);
    }
  });
  function mouseUp(){
    if(!mouseDown)return;mouseDown=false;
    const items=[...wrap.querySelectorAll('.stack-item')];
    const count=items.length;if(!count){startIdx=-1;return}
    const topEl=items[startIdx%count];
    if(moving&&Math.abs(dx)>50&&topEl){
      animating=true;
      const dir=dx>0?1:-1;
      topEl.style.transition='transform .22s ease-out,opacity .18s';
      topEl.style.transform=`translateX(${dir*350}px)`;
      topEl.style.opacity='0';
      wrap._cur=(wrap._cur+dir+count)%count;
      setTimeout(()=>{
        if(topEl){topEl.style.transition='';topEl.style.transform='';topEl.style.opacity=''}
        layout();animating=false;
      },220);
    }else if(topEl){
      topEl.style.transition='transform .15s ease-out,opacity .1s';
      topEl.style.transform='';topEl.style.opacity='';
      setTimeout(()=>{if(topEl)topEl.style.transition=''},150);
    }
    moving=false;startIdx=-1;dx=0;
  }
  wrap.addEventListener('mouseup',mouseUp);
  wrap.addEventListener('mouseleave',mouseUp);
}

// Attachments
function preFiles(){
  const files=document.getElementById('pFile').files;
  for(const f of files){
    if(f.type.startsWith('image/')&&f.size>200000){
      const img=new Image();const url=URL.createObjectURL(f);
      img.onload=()=>{
        const cv=document.createElement('canvas');
        let w=img.width,h=img.height;
        if(w>1200){h=h*1200/w;w=1200}
        cv.width=w;cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        cv.toBlob(bl=>{
          const r=new FileReader();
          r.onload=e=>{pendingFiles.push({name:f.name,type:'image',url:e.target.result,thumb:e.target.result});renderAttachments()};
          r.readAsDataURL(bl);
          URL.revokeObjectURL(url);
        },'image/jpeg',0.65);
      };
      img.src=url;
    }else{
      const reader=new FileReader();
      reader.onload=e=>{pendingFiles.push({name:f.name,type:f.type.split('/')[0]||'file',url:e.target.result,thumb:e.target.result});renderAttachments()};
      reader.readAsDataURL(f);
    }
  }
}

  const el=document.getElementById('prevArea');
  el.innerHTML=pendingKeep.map((a,i)=>a.type==='image'?`<div class="pt"><img src="${a.thumb||a.url}" onclick="previewImg(this.src)" style="cursor:pointer"><div class="rm" onclick="event.stopPropagation();rmKeepAt(${i})">\u00D7</div></div>`:`<div class="pf"><span>\uD83D\uDCCE ${esc(a.name)}</span><button class="rm" onclick="rmKeepAt(${i})">\u00D7</button></div>`).join('')+
  pendingFiles.map((a,i)=>a.type==='image'?`<div class="pt"><img src="${a.thumb||a.url}" onclick="previewImg(this.src)" style="cursor:pointer"><div class="rm" onclick="event.stopPropagation();rmFileAt(${i})">\u00D7</div></div>`:`<div class="pf"><span>\uD83D\uDCCE ${esc(a.name)}</span><button class="rm" onclick="rmFileAt(${i})">\u00D7</button></div>`).join('');

async function shareP(id){
  const p=D.prompts.find(x=>x.id===id);if(!p)return;
  toast('生成长图中...');
  try{
    const W=750, PAD=40, fs=28, fsSmall=22, fsTitle=40;
    const canvas=document.createElement('canvas');
    const ctx=canvas.getContext('2d');

    // Collect all images from attachments
    const imgs=[];
    for(const a of(p.attachments||[]).filter(a=>a.type==='image')){
      let src=a.url||a.thumb;
      if(!src&&a.id)src=await loadAttachmentURL(a);
      if(src)imgs.push(src);
    }

    // Measure text heights
    ctx.font=fs+'px -apple-system,BlinkMacSystemFont,sans-serif';
    function measureText(text,maxW,font){
      ctx.font=font||fs+'px -apple-system,BlinkMacSystemFont,sans-serif';
      const lines=[];
      for(const para of text.split('\n')){
        if(!para.trim()){lines.push('');continue}
        let line='';
        for(const ch of para){
          if(ctx.measureText(line+ch).width>maxW){lines.push(line);line=ch}else{line+=ch}
        }
        if(line)lines.push(line);
      }
      return lines;
    }

    // Calculate total height
    let totalH=180;
    totalH+=fsTitle+20;
    const contentLines=measureText(p.content||'',W-PAD*2);
    totalH+=contentLines.length*(fs*1.6)+30;
    if(p.example){
      totalH+=30;
      const exLines=measureText(p.example,W-PAD*2,fsSmall+'px -apple-system,sans-serif');
      totalH+=exLines.length*(fsSmall*1.5)+20;
    }
    if(p.tags&&p.tags.length)totalH+=50;
    const imgH=imgs.length?imgs.length*300+40:0;
    totalH+=imgH;
    totalH+=60;

    canvas.width=W*2;canvas.height=totalH*2;
    ctx.scale(2,2);
    const H=totalH;

    // Background
    ctx.fillStyle='#f5f5f7';
    ctx.fillRect(0,0,W,H);

    // Header gradient
    const grad=ctx.createLinearGradient(0,0,W,160);
    grad.addColorStop(0,'#667eea');grad.addColorStop(1,'#764ba2');
    ctx.fillStyle=grad;
    roundRect(ctx,0,0,W,160,0);ctx.fill();
    ctx.fillStyle='#fff';
    ctx.font='bold 24px -apple-system,sans-serif';
    ctx.fillText('提示词盒子',PAD,50);
    ctx.font='18px -apple-system,sans-serif';
    ctx.globalAlpha=0.8;
    ctx.fillText(new Date().toLocaleDateString('zh-CN'),PAD,80);
    ctx.globalAlpha=1;

    // Title
    let y=190;
    ctx.fillStyle='#1d1d1f';
    ctx.font='bold '+fsTitle+'px -apple-system,sans-serif';
    ctx.fillText(p.title||'未命名',PAD,y);
    y+=fsTitle+20;

    // Content
    ctx.font=fs+'px -apple-system,sans-serif';
    ctx.fillStyle='#333';
    for(const line of contentLines){ctx.fillText(line,PAD,y);y+=fs*1.6}
    y+=20;

    // Example
    if(p.example){
      ctx.fillStyle='#888';ctx.font='bold '+fsSmall+'px -apple-system,sans-serif';
      ctx.fillText('示例',PAD,y);y+=30;
      ctx.font=fsSmall+'px -apple-system,sans-serif';
      const exLines2=measureText(p.example,W-PAD*2,fsSmall+'px -apple-system,sans-serif');
      for(const line of exLines2){ctx.fillText(line,PAD,y);y+=fsSmall*1.5}
      y+=10;
    }

    // Tags
    if(p.tags&&p.tags.length){
      ctx.font='20px -apple-system,sans-serif';let tx=PAD;
      for(const tag of p.tags){
        const tw=ctx.measureText(tag).width+24;
        ctx.fillStyle='#e8e8ed';roundRect(ctx,tx,y-18,tw,28,14);ctx.fill();
        ctx.fillStyle='#555';ctx.fillText(tag,tx+12,y);tx+=tw+8;
      }
      y+=50;
    }

    // Images
    for(const src of imgs){
      try{
        const img=await loadImage(src);
        const ratio=img.width/(W-PAD*2);const ih=img.height/ratio;
        ctx.save();roundRect(ctx,PAD,y,W-PAD*2,Math.min(ih,280),12);ctx.clip();
        ctx.drawImage(img,PAD,y,W-PAD*2,Math.min(ih,280));ctx.restore();
        y+=Math.min(ih,280)+16;
      }catch(e){}
    }

    // Footer
    y+=20;ctx.fillStyle='#aaa';ctx.font='16px -apple-system,sans-serif';
    ctx.fillText('由 提示词盒子 生成',PAD,y);

    // Export as data URL for preview
    const dataUrl=canvas.toDataURL('image/png');
    window._shareBlob=await new Promise(r=>canvas.toBlob(r,'image/png'));
    window._shareTitle=p.title;

    // Show preview modal
    const vm=document.getElementById('vm');
    const vmB=document.getElementById('vmB');
    vmB.innerHTML=`<div style="max-width:90vw;max-height:80vh;overflow:auto;border-radius:12px;background:var(--bg2)">
      <img src="${dataUrl}" style="width:100%;display:block;border-radius:12px 12px 0 0">
      <div style="display:flex;gap:8px;padding:12px 16px;border-top:.5px solid var(--border)">
        <button onclick="shareDL()" style="flex:1;padding:12px;border-radius:10px;font-size:15px;font-weight:600;background:var(--primary);color:#fff;border:none;cursor:pointer">保存图片</button>
        <button onclick="shareToApp()" style="flex:1;padding:12px;border-radius:10px;font-size:15px;font-weight:600;background:var(--bg3);color:var(--text);border:none;cursor:pointer">分享到...</button>
        <button onclick="closeVM()" style="padding:12px 16px;border-radius:10px;font-size:15px;background:var(--bg3);color:var(--text2);border:none;cursor:pointer">取消</button>
      </div>
    </div>`;
    vm.classList.add('open');
    toast('');
  }catch(e){
    console.error('shareP error:',e);
    toast('生成失败: '+e.message);
  }
}
function closeVM(){document.getElementById('vm').classList.remove('open')}
function shareDL(){
  const blob=window._shareBlob;if(!blob)return;
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`prompt-${Date.now()}.png`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  closeVM();toast('已保存');
}
async function shareToApp(){
  const blob=window._shareBlob;const title=window._shareTitle||'提示词';
  if(!blob)return closeVM();
  const file=new File([blob],`prompt-${Date.now()}.png`,{type:'image/png'});
  try{
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:title});
      closeVM();toast('已分享');
    }else{
      // No Web Share API, fallback to download
      shareDL();toast('已保存到相册，请手动分享到其他应用');
    }
  }catch(e){
    if(e.name!=='AbortError'){shareDL();toast('已保存到相册')}
  }
}

function loadImage(src){return new Promise((res,rej)=>{const img=new Image();img.crossOrigin='anonymous';img.onload=()=>res(img);img.onerror=rej;img.src=src})}
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}
function handleShareImp(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(!d.title||!d.content)throw new Error('invalid');
      const p={id:gid(),title:d.title,content:d.content,example:d.example||'',tags:d.tags||[],folder:'',starred:false,isPinned:false,colorMark:'',attachments:[],copyCount:0,versions:[],createdAt:Date.now(),updatedAt:Date.now(),sortOrder:D.prompts.length};
      D.prompts.push(p);saveD();render();toast('\u5DF2\u5BFC\u5165\u5206\u4EAB\u63D0\u793A\u8BCD');
    }catch(err){toast('\u65E0\u6548\u7684\u5206\u4EAB\u6587\u4EF6')}
  };r.readAsText(f);e.target.value='';
}

// Sort
const sorts=['time_desc','time_asc','name_asc','name_desc','use_desc','custom'];
const sortNames={'time_desc':'\u65F6\u95F4\u2193','time_asc':'\u65F6\u95F4\u2191','name_asc':'\u540D\u79F0A\u2192Z','name_desc':'\u540D\u79F0Z\u2192A','use_desc':'\u6700\u5E38\u7528','custom':'\u81EA\u5B9A\u4E49'};
function cycleSort(){const i=sorts.indexOf(D.settings.sort||'time_desc');D.settings.sort=sorts[(i+1)%sorts.length];document.getElementById('sortBtn').textContent='\uD83D\uDD52';showKbd(sortNames[D.settings.sort]);saveD();render()}
function toggleGrid(){D.settings.grid=D.settings.grid===1?2:1;document.getElementById('gridBtn').textContent=D.settings.grid===1?'\u25A4':'\u25A3';saveD();render()}

// Theme
function toggleTheme(){D.settings.darkMode=!D.settings.darkMode;applyTheme();saveD()}
function applyTheme(){document.documentElement.dataset.theme=D.settings.darkMode?'dark':'';document.getElementById('themeBtn').textContent=D.settings.darkMode?'\u2600':'\u25D1'}

// Trash
function openTrash(){setFolder('__trash__');toggleSB()}
function exitTrash(){curF=null;document.getElementById('trashB').style.display='none';render()}

// Export
function exportD(){
  const data={prompts:D.prompts.filter(p=>!p.deleted),folders:D.folders,templates:D.templates,settings:D.settings};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='\u63D0\u793A\u8BCD\u76D2\u5B50_\u5907\u4EFD_'+new Date().toISOString().slice(0,10)+'.json';a.click();toast('\u5DF2\u5BFC\u51FA');
}
function importD(){document.getElementById('impIn').click()}
function handleImp(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(d.prompts)D.prompts.push(...d.prompts.map(p=>({...p,id:gid(),deleted:false})));
      if(d.folders)D.folders.push(...d.folders.map(f2=>({...f2,id:gfid()})));
      if(d.templates)D.templates.push(...d.templates);
      saveD();render();toast('\u5DF2\u5BFC\u5165');
    }catch(err){toast('\u65E0\u6548\u7684\u5907\u4EFD\u6587\u4EF6')}
  };r.readAsText(f);e.target.value='';
}

// Stats
function openStats(){
  document.getElementById('panelTitle').textContent='\uD83D\uDCCA \u7EDF\u8BA1\u9762\u677F';
  const all=D.prompts.filter(p=>!p.deleted);
  const top5=[...all].sort((a,b)=>(b.copyCount||0)-(a.copyCount||0)).slice(0,5);
  const allTags={};all.forEach(p=>(p.tags||[]).forEach(t=>{allTags[t]=(allTags[t]||0)+1}));
  const topTags=Object.entries(allTags).sort((a,b)=>b[1]-a[1]).slice(0,8);
  let html='<div class="stat-group"><h4>\u6982\u89C8</h4><div class="stat-row"><div class="stat-card"><div class="stat-big">'+all.length+'</div><div class="stat-label">\u63D0\u793A\u8BCD</div></div><div class="stat-card"><div class="stat-big">'+D.folders.length+'</div><div class="stat-label">\u6587\u4EF6\u5939</div></div><div class="stat-card"><div class="stat-big">'+Object.keys(allTags).length+'</div><div class="stat-label">\u6807\u7B7E</div></div></div></div>';
  if(top5.length){html+='<div class="stat-group"><h4>\uD83C\uDFC6 \u6700\u5E38\u7528 Top5</h4>'+top5.map((p,i)=>`<div class="stat-item"><span class="stat-rank">${i+1}</span><span class="stat-title">${esc(p.title)}</span><span class="stat-val">${p.copyCount||0}\u6B21</span></div>`).join('')+'</div>'}
  if(topTags.length){html+='<div class="stat-group"><h4>\uD83C\uDFF7 \u6807\u7B7E\u6392\u884C</h4>'+topTags.map(([t,c])=>`<div class="stat-item"><span class="stat-title">${esc(t)}</span><span class="stat-val">${c}\u4E2A</span></div>`).join('')+'</div>'}
  document.getElementById('panelBody').innerHTML=html;
  document.getElementById('statsBbg').classList.add('open');document.getElementById('statsPanel').classList.add('open');
}
function closePanel(bgId,panelId){document.getElementById(bgId).classList.remove('open');document.getElementById(panelId).classList.remove('open')}

// Copy History
function openHistory(){
  document.getElementById('panelTitle').textContent='\uD83D\uDDC4 \u590D\u5236\u5386\u53F2';
  if(!D.copyHistory.length){document.getElementById('panelBody').innerHTML='<div class="empty" style="padding:40px"><p>\u6682\u65E0\u590D\u5236\u8BB0\u5F55</p></div>'}
  else{
    document.getElementById('panelBody').innerHTML=D.copyHistory.map(h=>`<div class="hist-item" onclick="clipCopy(\`${h.content.replace(/`/g,'\\`')}\`).then(()=>toast('\u5DF2\u590D\u5236'))"><span class="h-title">${esc(h.promptTitle)}</span><span class="h-time">${fdate(h.copiedAt)}</span><button class="h-cp">\u590D\u5236</button></div>`).join('');
  }
  document.getElementById('statsBbg').classList.add('open');document.getElementById('statsPanel').classList.add('open');
}

// Theme Color Picker
function openThemePicker(){
  document.getElementById('panelTitle').textContent='\uD83C\uDFA8 \u4E3B\u9898\u8272';
  document.getElementById('panelBody').innerHTML='<div class="theme-row">'+TCOLORS.map(t=>`<div class="theme-dot ${D.settings.themeColor===t.c?'sel':''}" style="background:${t.c}" onclick="setThemeColor('${t.c}')" title="${t.n}"></div>`).join('')+'</div>';
  document.getElementById('statsBbg').classList.add('open');document.getElementById('statsPanel').classList.add('open');
}
function setThemeColor(c){
  D.settings.themeColor=c;document.documentElement.style.setProperty('--primary',c);saveD();
  openThemePicker();toast('\u5DF2\u66F4\u6539\u4E3B\u9898\u8272');
}

// Keyboard shortcuts
document.addEventListener('keydown',e=>{
  const mod=e.ctrlKey||e.metaKey;
  if(mod&&e.key==='n'){e.preventDefault();openM();showKbd('\u65B0\u5EFA')}
  if(mod&&e.key==='f'){e.preventDefault();document.getElementById('searchIn').focus();showKbd('\u641C\u7D22')}
  if(e.key==='Escape'){
    if(document.getElementById('modal').classList.contains('open'))closeM();
    else if(document.getElementById('sb').classList.contains('open'))toggleSB();
    else if(document.getElementById('statsPanel').classList.contains('open'))closePanel('statsBbg','statsPanel');
  }
});

// Long press for action sheet
let longPressTimer=null;
document.addEventListener('touchstart',e=>{
  const card=e.target.closest('.card');
  if(!card)return;
  longPressTimer=setTimeout(()=>{
    const id=card.dataset.id;if(id){
      openAS(id);
      if(navigator.vibrate)navigator.vibrate(50);
    }
  },600);
});
document.addEventListener('touchend',()=>clearTimeout(longPressTimer));
document.addEventListener('touchmove',()=>clearTimeout(longPressTimer));

// Scroll hide header
let lastScroll=0;
document.getElementById('content').addEventListener('scroll',e=>{
  const st=e.target.scrollTop;
  
  const sb=document.getElementById('searchBar');
  if(st>120&&st>lastScroll){sb.style.transform='translateY(-100%)';sb.style.opacity='0';sb.style.maxHeight='0';sb.style.padding='0 16px'}
  else if(st<=lastScroll){sb.style.transform='';sb.style.opacity='';sb.style.maxHeight='';sb.style.padding=''}
  lastScroll=st;
});

// ===== ACTION SHEET =====
let asCardId = null;
function openAS(id) {
  asCardId = id;
  const p = D.prompts.find(x => x.id === id);
  if (!p) return;
  const isTrash = curF === '__trash__';
  let items = '';
  if (isTrash) {
    items = `
      <div class="as-item" onclick="restoreP('${id}');closeAS()"><span class="as-icon">🔄</span>恢复提示词</div>
      <div class="as-item danger" onclick="permDel('${id}');closeAS()"><span class="as-icon">🗑️</span>永久删除</div>`;
  } else {
    items = `
      <div class="as-item" onclick="copyP('${id}');closeAS()"><span class="as-icon">📋</span>复制内容</div>
      <div class="as-item" onclick="editP('${id}');closeAS()"><span class="as-icon">✏️</span>编辑</div>
      <div class="as-item" onclick="showMoveModal('${id}')"><span class="as-icon">📁</span>移动到文件夹</div>
      <div class="as-item" onclick="showTagModal('${id}')"><span class="as-icon">🏷️</span>编辑标签</div>
      <div class="as-item" onclick="toggleStarFromAS('${id}')"><span class="as-icon">${p.starred ? '⭐' : '☆'}</span>${p.starred ? '取消收藏' : '收藏'}</div>
      <div class="as-item" onclick="togglePinFromAS('${id}')"><span class="as-icon">📌</span>${p.isPinned ? '取消置顶' : '置顶'}</div>
      <div class="as-item" onclick="shareP('${id}');closeAS()"><span class="as-icon">📤</span>分享</div>
      <div class="as-item" onclick="batchFromAS('${id}')"><span class="as-icon">☑️</span>多选模式</div>
      <div class="as-item danger" onclick="delFromAS('${id}')"><span class="as-icon">🗑️</span>删除</div>`;
  }
  document.getElementById('asBody').innerHTML = '<div class="as-title">' + esc(p.title) + '</div>' + items;
  document.getElementById('asOL').classList.add('open');
  document.getElementById('as').classList.add('open');
}
function closeAS() {
  document.getElementById('asOL').classList.remove('open');
  document.getElementById('as').classList.remove('open');
  asCardId = null;
  if(batchMode)document.getElementById('batchBar').classList.add('open');
}
function toggleStarFromAS(id) {
  const p = D.prompts.find(x => x.id === id); if (!p) return;
  p.starred = !p.starred; p.updatedAt = Date.now();
  saveD(); render(); toast(p.starred ? '已收藏' : '已取消收藏');
}
function togglePinFromAS(id) {
  const p = D.prompts.find(x => x.id === id); if (!p) return;
  p.isPinned = !p.isPinned; p.updatedAt = Date.now();
  saveD(); render(); toast(p.isPinned ? '已置顶' : '已取消置顶');
}
function batchFromAS(id) {
  closeAS();
  batchMode = true; selectedIds.add(id);
  document.getElementById('batchBar').classList.add('open');
  updateBatch(); render();
}
function delFromAS(id) {
  closeAS();
  const p = D.prompts.find(x => x.id === id);
  if (p) { p.deleted = true; saveD(); render(); toast('已移至回收站'); }
}

// Move to folder sub-modal
function showMoveModal(id) {
  const p = D.prompts.find(x => x.id === id); if (!p) return;
  let items = '<div class="as-title">移动到文件夹</div>';
  items += `<div class="as-item" onclick="moveToFolder('${id}','')"><span class="as-icon">📂</span>无文件夹</div>`;
  D.folders.forEach(f => {
    const cur = p.folder === f.id ? ' ✓' : '';
    items += `<div class="as-item" onclick="moveToFolder('${id}','${f.id}')"><span class="as-icon"><span class="fdot" style="background:${f.color};display:inline-block;width:12px;height:12px;border-radius:50%"></span></span>${esc(f.name)}${cur}</div>`;
  });
  document.getElementById('asBody').innerHTML = items;
}
function moveToFolder(id, folderId) {
  const p = D.prompts.find(x => x.id === id);
  if (p) { p.folder = folderId; p.updatedAt = Date.now(); saveD(); render(); }
  closeAS(); toast('已移动');
}

// Tag edit sub-modal
function showTagModal(id) {
  const p = D.prompts.find(x => x.id === id); if (!p) return;
  const tags = p.tags || [];
  let items = '<div class="as-title">编辑标签</div>';
  items += `<div class="as-item" style="padding:10px 18px"><input type="text" id="asTagIn" placeholder="输入新标签回车添加" style="flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:10px 12px;font-size:15px" onkeydown="if(event.key==='Enter'){event.preventDefault();addTagFromAS('${id}',this.value.trim());this.value=''}"></div>`;
  tags.forEach((t, i) => {
    items += `<div class="as-item" onclick="removeTagFromAS('${id}',${i})"><span class="as-icon">🏷️</span>${esc(t)}<span style="margin-left:auto;color:var(--danger);font-size:14px">×</span></div>`;
  });
  document.getElementById('asBody').innerHTML = items;
  setTimeout(() => { const inp = document.getElementById('asTagIn'); if (inp) inp.focus(); }, 350);
}
function addTagFromAS(id, tag) {
  if (!tag) return;
  const p = D.prompts.find(x => x.id === id); if (!p) return;
  if (!p.tags) p.tags = [];
  if (p.tags.includes(tag)) { toast('标签已存在'); return; }
  p.tags.push(tag); saveD(); showTagModal(id); render(); toast('已添加标签');
}
function removeTagFromAS(id, idx) {
  const p = D.prompts.find(x => x.id === id); if (!p || !p.tags) return;
  p.tags.splice(idx, 1); saveD(); showTagModal(id); render();
}

    <div class="mopt-item" onclick="importD();closeMopt()"><span class="mopt-icon">📥</span>导入数据</div>
    <div class="mopt-item" onclick="document.getElementById('shareIn').click();closeMopt()"><span class="mopt-icon">🔗</span>导入分享</div>
    <div class="mopt-author">
      <div class="mopt-name">🦞 关于</div>
      <div>@皮皮灭与由mimo-v2-pro驱动的openclaw🦞共同开发</div>
    </div>`;
  document.getElementById('moptOL').classList.add('open');
  document.getElementById('mopt').classList.add('open');
}
function closeMopt() {
  document.getElementById('moptOL').classList.remove('open');
  document.getElementById('mopt').classList.remove('open');
}

function permDel(id) {
  if (!confirm('永久删除此提示词？')) return;
  D.prompts = D.prompts.filter(p => p.id !== id);
  saveD(); render(); toast('已永久删除');
}
function init(){
  try{
    applyTheme();
    if(D.settings&&D.settings.themeColor){document.documentElement.style.setProperty('--primary',D.settings.themeColor)}
    var gb=document.getElementById('gridBtn');
    if(gb)gb.textContent=(D.settings&&D.settings.grid===1)?'\u25A4':'\u25A3';
    render();
  }catch(e){
    console.error('init error:',e);
    document.getElementById('cardsBox').innerHTML='<div class="empty"><div class="icon">⚠️</div><p>加载出错: '+esc(e.message)+'</p><p style="font-size:13px;margin-top:8px"><button onclick="localStorage.removeItem(\'promptbox_data\');location.reload()" style="background:var(--primary);color:#fff;padding:8px 16px;border-radius:8px;font-size:13px">重置数据并刷新</button></p></div>';
  }
}
// Global error handler
window.onerror=function(msg,src,line){console.error('Global error:',msg,src,line);};
init();
</script>
