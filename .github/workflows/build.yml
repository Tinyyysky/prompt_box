name: Build APK
on:
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Build APK
        run: chmod +x gradlew && ./gradlew assembleRelease
      - name: Sign APK
        run: |
          cd app/build/outputs/apk/release
          keytool -genkey -v -keystore pb.keystore -alias pb -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=PromptBox" -noprompt
          $ANDROID_HOME/build-tools/*/zipalign -v 4 app-release-unsigned.apk aligned.apk
          apksigner sign --ks pb.keystore --ks-pass pass:android --out promptbox.apk aligned.apk          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: prompt-box-apk
          path: app/build/outputs/apk/release/promptbox.apk
          retention-days: 30
